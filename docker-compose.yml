services:
  orientdb-node:
    image: orientdb:3.2.30
    container_name: orientdb-node
    environment:
      - ORIENTDB_ROOT_PASSWORD=admin
      - ORIENTDB_NODE_NAME=node_huy
      - JAVA_OPTS=-Dhazelcast.local.publicAddress=26.175.219.39:5701 -Dhazelcast.socket.bind.any=true # thay bằng ip cá nhân
    ports:
      - "2424:2424"   # Cổng truyền dữ liệu giữa các máy
      - "2480:2480"   # Cổng vào Studio (Localhost)
      - "5701:5701"   # Cổng quan trọng nhất để các máy "thấy" nhau
    volumes:
      - ./hazelcast.xml:/orientdb/config/hazelcast.xml
      - ./default-distributed-db-config.json:/orientdb/config/default-distributed-db-config.json
    # Thêm dòng này để Docker trên Windows nhận diện tốt hơn
    stdin_open: true
    tty: true
    command: /orientdb/bin/server.sh -Ddistributed=true